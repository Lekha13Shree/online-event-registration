<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Username (admin or student)">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>

    <script>
        function login() {
            let user = document.getElementById('user').value;
            if (user === 'admin') window.location.href = 'admin.html';
            else if (user === 'student') window.location.href = 'student.html';
            else alert('Use "admin" or "student" to login');
        }
    </script>
</body>
</html>
